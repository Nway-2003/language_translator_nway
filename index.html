<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translator</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
    <span class="material-icons">translate</span> 
    <span class="logo-text">Language Translator</span> <!-- Added this span -->
</div>
    </div>
    <div class="nav-right">
      <a href="https://github.com/LibreTranslate/LibreTranslate" target="_blank" class="nav-link">GitHub</a>
      <button id="themeToggle" class="nav-icon-btn">
        <span class="material-icons" id="themeIcon">lightbulb</span>
      </button>
    </div>
  </nav>

  <div class="translator-container">
    <h1 class="main-title">Language Translator</h1>
    <p class="subtitle">Powered by self-hosted API</p>

    <div class="history-action">
  <button id="favoriteBtn" class="icon-btn" title="Favorites">
    <span class="material-icons">star_border</span>
  </button>
  
  <button id="historyBtn" class="icon-btn" title="Translation History">
    <span class="material-icons">history</span>
  </button>
</div>

    <div class="tabs">
      <button class="tab-btn active" id="textTabBtn">
        <span class="material-icons">text_fields</span> TRANSLATE TEXT
      </button>
      <button class="tab-btn" id="fileTabBtn">
        <span class="material-icons">description</span> TRANSLATE FILES
      </button>
    </div>

    <div class="lang-row">
      <div class="select-wrapper">
        <select id="sourceLang">
          <option value="auto" id="autoDetectOption">Auto Detect</option>
          <option value="sq">Albanian</option>
          <option value="ar">Arabic</option>
          <option value="az">Azerbaijani</option>
          <option value="bn">Bengali</option>
          <option value="bg">Bulgarian</option>
          <option value="zh">Chinese</option>
          <option value="cs">Czech</option>
          <option value="da">Danish</option>
          <option value="nl">Dutch</option>
          <option value="en">English</option>
          <option value="eo">Esperanto</option>
          <option value="et">Estonian</option>
          <option value="fi">Finnish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="el">Greek</option>
          <option value="he">Hebrew</option>
          <option value="hi">Hindi</option>
          <option value="hu">Hungarian</option>
          <option value="id">Indonesian</option>
          <option value="ga">Irish</option>
          <option value="it">Italian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ky">Kyrgyz</option>
          <option value="lv">Latvian</option>
          <option value="lt">Lithuanian</option>
          <option value="ms">Malay</option>
          <option value="fa">Persian</option>
          <option value="pl">Polish</option>
          <option value="pt">Portuguese</option>
          <option value="ro">Romanian</option>
          <option value="ru">Russian</option>
          <option value="sk">Slovak</option>
          <option value="es">Spanish</option>
          <option value="sv">Swedish</option>
          <option value="tl">Tagalog</option>
          <option value="th">Thai</option>
          <option value="tr">Turkish</option>
          <option value="uk">Ukrainian</option>
          <option value="ur">Urdu</option>
          <option value="vi">Vietnamese</option>
        </select>
      </div>

      <button id="swapBtn" type="button"><span class="material-icons">swap_horiz</span></button>
      
      <div class="select-wrapper">
      <select id="targetLang">
        <option value="sq">Albanian</option>
        <option value="ar">Arabic</option>
        <option value="az">Azerbaijani</option>
        <option value="bn">Bengali</option>
        <option value="bg">Bulgarian</option>
        <option value="zh">Chinese</option>
        <option value="cs">Czech</option>
        <option value="da">Danish</option>
        <option value="nl">Dutch</option>
        <option value="en">English</option>
        <option value="eo">Esperanto</option>
        <option value="et">Estonian</option>
        <option value="fi">Finnish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="el">Greek</option>
        <option value="he">Hebrew</option>
        <option value="hi">Hindi</option>
        <option value="hu">Hungarian</option>
        <option value="id">Indonesian</option>
        <option value="ga">Irish</option>
        <option value="it">Italian</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ky">Kyrgyz</option>
        <option value="lv">Latvian</option>
        <option value="lt">Lithuanian</option>
        <option value="ms">Malay</option>
        <option value="fa">Persian</option>
        <option value="pl">Polish</option>
        <option value="pt">Portuguese</option>
        <option value="ro">Romanian</option>
        <option value="ru">Russian</option>
        <option value="sk">Slovak</option>
        <option value="es">Spanish</option>
        <option value="sv">Swedish</option>
        <option value="tl">Tagalog</option>
        <option value="th" selected>Thai</option>
        <option value="tr">Turkish</option>
        <option value="uk">Ukrainian</option>
        <option value="ur">Urdu</option>
        <option value="vi">Vietnamese</option>
      </select>
      </div>
    </div>

    <div id="text-content" class="tab-content active">
      <div class="text-row">
        <div class="text-box">
          <textarea id="inputText" maxlength="2000" placeholder="Enter text here..."></textarea>
          <div class="box-controls">
            <div class="control-left">
              <button class="icon-btn" id="voiceTypingBtn" title="Voice Typing">
                <span class="material-icons" id="micIcon">mic</span>
              </button>
              <button class="icon-btn" id="speakInputBtn" title="Listen">
                <span class="material-icons">volume_up</span>
              </button>
            </div>
            <div class="control-right">
              <span id="charCount">0 characters</span>
              <button class="icon-btn" id="clearBtn" title="Clear">
                <span class="material-icons">close</span>
              </button>
            </div>
          </div>
        </div>

        <div class="text-box">
          <textarea id="resultText" placeholder="Translation will appear here..." readonly></textarea>
          <div class="box-controls">
            <div class="control-left">
              <button class="icon-btn" id="speakBtn" title="Listen">
                <span class="material-icons">volume_up</span>
              </button>
              <button class="icon-btn" id="copyBtn" title="Copy Result">
                <span class="material-icons">content_copy</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="file-content" class="tab-content">
      <div class="file-section">
  <div class="upload-icon"><span class="material-icons" style="font-size: 3rem;">description</span></div>
  
  <div class="custom-file-wrapper">
    <label for="fileInput" class="custom-file-btn">Choose File</label>
    <span id="fileNameDisplay">No file chosen</span>
  </div>

  <p style="font-size: 0.85rem; color: #6b7280; margin-top: 10px;">Supported: .txt, .docx, .pdf, .pptx</p>
  
  <input type="file" id="fileInput" accept=".txt,.docx,.pdf,.pptx,.xlsx" hidden>
  <button id="fileTranslateBtn" type="button" style="display: none;">TRANSLATE DOCUMENT</button>
</div>
    </div>

    <!-- Place this right after the file-content div -->
<div id="history-content" class="tab-content">
  <div class="history-list" id="historyList">
    <!-- Items will be injected here -->
  </div>
  <button id="clearHistoryBtn" class="custom-file-btn" style="margin-top: 20px; background: #ef4444; border:none;">Clear All</button>
</div>

    <p id="statusMsg"></p>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Language Translator. Project Powered by self-hosted API.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
